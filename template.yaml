AWSTemplateFormatVersion: '2010-09-09'
Description: Modèle CloudFormation pour un site web statique hébergé sur S3 avec rétention à la suppression.

Resources:
  S3Bucket:
    Type: 'AWS::S3::Bucket'
    DeletionPolicy: Retain
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html

  BucketPolicy:
    Type: 'AWS::S3::BucketPolicy'
    Properties:
      Bucket: !Ref S3Bucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: '*'
            Action: 's3:GetObject'
            Resource: !Sub 'arn:aws:s3:::${S3Bucket}/*'

Outputs:
  WebsiteURL:
    Description: URL du site web hébergé sur S3.
    Value: !GetAtt S3Bucket.WebsiteURL
  S3BucketSecureURL:
    Description: URL sécurisée HTTPS du compartiment S3.
    Value: !Sub 'https://${S3Bucket}.s3.amazonaws.com'
